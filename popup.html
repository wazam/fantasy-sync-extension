<!DOCTYPE html>
<html>
<head>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { overflow: hidden; }
    body {
      font-family: Arial, sans-serif;
      padding: 8px;
      width: 380px;
      max-height: 560px;
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .section {
      margin-bottom: 7px;
      padding-bottom: 7px;
      border-bottom: 1px solid #ddd;
    }
    .section-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .row {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-bottom: 4px;
    }
    label {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      flex: 0 0 105px;
    }
    input[type="text"] {
      flex: 1;
      font-size: 11px;
      padding: 3px 4px;
    }
    .btn-save {
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .link-row {
      display: flex;
      gap: 3px;
    }
    .link-btn {
      flex: 1;
      font-size: 11px;
      padding: 5px 4px;
      cursor: pointer;
      text-align: center;
      background: #f5f5f5;
      border: 1px solid #ccc;
      border-radius: 3px;
      color: #1a73e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-btn:hover { background: #e8f0fe; border-color: #1a73e8; }
    .link-btn.disabled { color: #aaa; cursor: default; background: #f9f9f9; border-color: #e0e0e0; }
    #next {
      width: 100%;
      font-size: 12px;
      padding: 6px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 2px;
    }
    #next:hover { background: #1558b0; }
    #queue-list {
      padding-top: 4px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: 11px;
    }
    .tx-row {
      display: flex;
      gap: 6px;
      padding: 3px 2px;
      border-bottom: 1px solid #f0f0f0;
      align-items: baseline;
      line-height: 1.3;
    }
    .tx-row[title]:hover { background: #f0f4ff; }
    .tx-row.tx-done   { color: #bbb; text-decoration: line-through; }
    .tx-row.tx-cutoff { color: #bbb; }
    .tx-row.tx-cutoff.tx-done { color: #ddd; }
    .tx-date    { flex: 0 0 90px; font-size: 10px; }
    .tx-type    { flex: 0 0 28px; font-weight: bold; text-align: center; font-size: 10px; }
    .tx-team    { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tx-players { flex: 0 0 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .add  { color: #079a3e; }
    .drop { color: #ec1c25; }
    .tx-row.tx-cutoff .add,
    .tx-row.tx-cutoff .drop,
    .tx-row.tx-done .add,
    .tx-row.tx-done .drop { color: inherit; }
    .empty        { color: #999; font-size: 11px; padding: 6px 2px; }
    .queue-header { font-size: 10px; color: #888; margin-bottom: 4px; }
  </style>
</head>
<body>

  <!-- League IDs -->
  <div class="section">
    <div class="section-label">League IDs</div>
    <div class="row">
      <label>ESPN League ID:</label>
      <input id="espnLeagueId" type="text" placeholder="numeric ID from ESPN URL" style="width:185px;flex:none;">
    </div>
    <div class="row">
      <label>Fantrax League ID:</label>
      <input id="fantraxLeagueId" type="text" placeholder="alphanumeric ID from Fantrax URL" style="width:185px;flex:none;">
      <button class="btn-save" id="saveLeagues">Save IDs</button>
    </div>
  </div>

  <!-- Quick links -->
  <div class="section">
    <div class="section-label">Quick Links</div>
    <div class="links">
      <div class="link-row">
        <button class="link-btn" id="linkEspn">&#9654; ESPN Recent Activity</button>
        <button class="link-btn" id="linkFantraxRecent">&#9654; Fantrax Recent Activity</button>
      </div>
      <div class="link-row">
        <button class="link-btn" id="linkFantraxClaim">&#9654; Fantrax Claim/Drop</button>
        <button class="link-btn" id="linkFantraxTrade">&#9654; Fantrax Trade</button>
      </div>
    </div>
  </div>

  <!-- Cutoff + next -->
  <div class="section">
    <div class="section-label">Sync Settings</div>
    <div class="row">
      <label>Cutoff (YYYY-MM-DD HH:MM):</label>
      <input id="cutoff" type="text" placeholder="2026-03-29 00:00" style="width:120px;flex:none;">
      <button class="btn-save" id="save">Save Cutoff</button>
    </div>
    <button id="next">Next Transaction (F8)</button>
  </div>

  <!-- Transaction queue -->
  <div id="queue-list">
    <div class="empty">No transactions loaded yet.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
