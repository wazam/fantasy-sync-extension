<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { overflow: hidden; }

    :root {
      --bg:               #ffffff;
      --text:             #333333;
      --label:            #555555;
      --section-label:    #888888;
      --section-border:   #dddddd;
      --input-bg:         #ffffff;
      --input-border:     #cccccc;
      --input-text:       #333333;
      --btn-bg:           #f0f0f0;
      --btn-border:       #cccccc;
      --btn-text:         #333333;
      --link-bg:          #f5f5f5;
      --link-border:      #cccccc;
      --link-color:       #1a73e8;
      --link-hover-bg:    #e8f0fe;
      --link-dis-color:   #aaaaaa;
      --link-dis-bg:      #f9f9f9;
      --link-dis-border:  #e0e0e0;
      --row-border:       #f0f0f0;
      --row-hover-bg:     #f0f4ff;
      --done-color:       #bbbbbb;
      --cutoff-color:     #bbbbbb;
      --done-cutoff:      #dddddd;
      --empty-color:      #999999;
      --queue-hdr:        #888888;
      --toolbar-icon:     #666666;
    }

    body.dark {
      --bg:               #1e1e1e;
      --text:             #e0e0e0;
      --label:            #aaaaaa;
      --section-label:    #666666;
      --section-border:   #3a3a3a;
      --input-bg:         #2d2d2d;
      --input-border:     #555555;
      --input-text:       #e0e0e0;
      --btn-bg:           #2d2d2d;
      --btn-border:       #555555;
      --btn-text:         #e0e0e0;
      --link-bg:          #2d2d2d;
      --link-border:      #555555;
      --link-color:       #7ab4f5;
      --link-hover-bg:    #1e3a5f;
      --link-dis-color:   #666666;
      --link-dis-bg:      #262626;
      --link-dis-border:  #444444;
      --row-border:       #2d2d2d;
      --row-hover-bg:     #1e2d45;
      --done-color:       #555555;
      --cutoff-color:     #555555;
      --done-cutoff:      #444444;
      --empty-color:      #666666;
      --queue-hdr:        #666666;
      --toolbar-icon:     #aaaaaa;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 8px;
      width: 380px;
      max-height: 560px;
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Toolbar ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .section-header .section-label { margin-bottom: 0; }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .toolbar-icon {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 15px;
      line-height: 1;
      color: var(--toolbar-icon);
      border-radius: 3px;
    }
    .toolbar-icon:hover { color: var(--text); background: var(--btn-bg); }

    .section {
      margin-bottom: 7px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--section-border);
    }
    .section-label {
      font-size: 10px;
      color: var(--section-label);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .row {
      display: flex;
      gap: 4px;
      align-items: center;
      margin-bottom: 4px;
    }
    label {
      font-size: 11px;
      color: var(--label);
      white-space: nowrap;
      flex: 0 0 105px;
    }
    .cutoff-label {
      font-size: 11px;
      color: var(--label);
      white-space: nowrap;
      flex: 0 0 auto;
    }
    input[type="text"] {
      flex: 1;
      font-size: 11px;
      padding: 3px 4px;
      background: var(--input-bg);
      color: var(--input-text);
      border: 1px solid var(--input-border);
      border-radius: 2px;
    }
    .btn-save {
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: 1px solid var(--btn-border);
      border-radius: 2px;
      white-space: nowrap;
    }
    .btn-save:hover { filter: brightness(0.95); }

    .links { display: flex; flex-direction: column; gap: 3px; }
    .link-row { display: flex; gap: 3px; }
    .link-btn {
      flex: 1;
      font-size: 11px;
      padding: 5px 4px;
      cursor: pointer;
      text-align: center;
      background: var(--link-bg);
      border: 1px solid var(--link-border);
      border-radius: 3px;
      color: var(--link-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-btn:hover { background: var(--link-hover-bg); border-color: var(--link-color); }
    .link-btn.disabled {
      color: var(--link-dis-color);
      cursor: default;
      background: var(--link-dis-bg);
      border-color: var(--link-dis-border);
    }

    #next {
      width: 100%;
      font-size: 12px;
      padding: 6px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      margin-top: 2px;
    }
    #next:hover { background: #1558b0; }

    #queue-list {
      padding-top: 4px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: 11px;
    }
    .tx-row {
      display: flex;
      gap: 6px;
      padding: 3px 2px;
      border-bottom: 1px solid var(--row-border);
      align-items: baseline;
      line-height: 1.3;
    }
    .tx-row[title]:hover { background: var(--row-hover-bg); }
    .tx-row.tx-done   { color: var(--done-color); text-decoration: line-through; }
    .tx-row.tx-cutoff { color: var(--cutoff-color); }
    .tx-row.tx-cutoff.tx-done { color: var(--done-cutoff); }
    .tx-row.tx-above  { color: var(--cutoff-color); }
    .tx-row.tx-above.tx-done  { color: var(--done-cutoff); }
    .tx-row.tx-excluded { opacity: 0.38; text-decoration: line-through; }
    .tx-row.drag-selected { background: var(--row-hover-bg) !important; outline: 1px solid var(--link-color); }
    .tx-date    { flex: 0 0 80px; font-size: 10px; }
    .tx-type    { flex: 0 0 28px; font-weight: bold; text-align: center; font-size: 10px; }
    .tx-team    { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tx-players { flex: 0 0 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .add  { color: #079a3e; }
    .drop { color: #ec1c25; }
    .tx-row.tx-cutoff .add,
    .tx-row.tx-cutoff .drop,
    .tx-row.tx-above .add,
    .tx-row.tx-above .drop,
    .tx-row.tx-excluded .add,
    .tx-row.tx-excluded .drop,
    .tx-row.tx-done .add,
    .tx-row.tx-done .drop { color: inherit; }
    .empty        { color: var(--empty-color); font-size: 11px; padding: 6px 2px; }
    .queue-header { font-size: 10px; color: var(--queue-hdr); margin-bottom: 4px; }
  </style>
</head>
<body>

  <!-- League IDs -->
  <div class="section">
    <div class="section-header">
      <div class="section-label">League IDs</div>
      <div class="toolbar">
        <button class="toolbar-icon" id="githubBtn" title="GitHub Repository">
          <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
              .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </button>
        <button class="toolbar-icon" id="themeToggle" title="Toggle dark/light mode">🌙</button>
      </div>
    </div>
    <div class="row">
      <label>ESPN League ID:</label>
      <input id="espnLeagueId" type="text" placeholder="numeric ID from ESPN URL" style="width:185px;flex:none;">
    </div>
    <div class="row">
      <label>Fantrax League ID:</label>
      <input id="fantraxLeagueId" type="text" placeholder="alphanumeric ID from Fantrax URL" style="width:185px;flex:none;">
      <button class="btn-save" id="saveLeagues">Save IDs</button>
    </div>
  </div>

  <!-- Quick links -->
  <div class="section">
    <div class="section-label">Quick Links</div>
    <div class="links">
      <div class="link-row">
        <button class="link-btn" id="linkEspn">&#9654; ESPN Recent Activity</button>
        <button class="link-btn" id="linkFantraxRecent">&#9654; Fantrax Recent Activity</button>
      </div>
      <div class="link-row">
        <button class="link-btn" id="linkFantraxClaim">&#9654; Fantrax Claim/Drop</button>
        <button class="link-btn" id="linkFantraxTrade">&#9654; Fantrax Trade</button>
      </div>
    </div>
  </div>

  <!-- Cutoff + next -->
  <div class="section">
    <div class="section-label">Sync Settings</div>
    <div class="row">
      <span class="cutoff-label">From:</span>
      <input id="cutoff" type="text" placeholder="YYYY-MM-DD HH:MM" style="width:120px;flex:none;">
      <span class="cutoff-label">To:</span>
      <input id="upperCutoff" type="text" placeholder="YYYY-MM-DD HH:MM" style="width:120px;flex:none;">
      <button class="btn-save" id="nowBtn">Now</button>
    </div>
    <button id="next">Next Transaction (F8)</button>
  </div>

  <!-- Transaction queue -->
  <div id="queue-list">
    <div class="empty">No transactions loaded yet.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
